<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Admin Dashboard</h1>

<!-- ================= CATEGORY SECTION ================= -->
<h2>Categories</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
</tr>

<tr th:each="cat : ${categories}">
    <td th:text="${cat.id}"></td>
    <td th:text="${cat.name}"></td>
</tr>
</table>

<h3>Create Category</h3>
<form th:action="@{/admin/categories}" method="post" th:object="${categoryForm}">
    <input type="text" th:field="*{name}" placeholder="Category name" required>
    <button type="submit">Add</button>
</form>

<hr>

<!-- ================= PRODUCT SECTION ================= -->
<h2>Products</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Actions</th>
</tr>

<tr th:each="p : ${products}">
    <td th:text="${p.id}"></td>
    <td th:text="${p.name}"></td>
    <td th:text="${p.price}"></td>
    <td th:text="${p.stockQty}"></td>

    <td>
        <!-- Deactivate -->
        <form th:action="@{'/admin/products/' + ${p.id} + '/deactivate'}" method="post">
            <button type="submit">Deactivate</button>
        </form>
    </td>
</tr>

</table>

<h3>Create Product</h3>
<form th:action="@{/admin/products}" method="post" th:object="${productForm}">
    <input type="text" th:field="*{name}" placeholder="Name"><br><br>
    <input type="text" th:field="*{description}" placeholder="Description"><br><br>
    <input type="number" th:field="*{price}" placeholder="Price"><br><br>
    <input type="number" th:field="*{stockQty}" placeholder="Stock"><br><br>
    <input type="number" th:field="*{categoryId}" placeholder="Category ID"><br><br>

    <button type="submit">Create Product</button>
</form>

<hr>

<!-- ================= ORDERS SECTION ================= -->
<h2>Orders</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Status</th>
    <th>Total</th>
    <th>Update</th>
</tr>

<tr th:each="o : ${orders.content}">
    <td th:text="${o.id}"></td>
    <td th:text="${o.status}"></td>
    <td th:text="${o.total}"></td>

    <td>
        <form th:action="@{'/admin/orders/' + ${o.id} + '/status'}" method="post">
            <select name="status">
                <option value="NEW">NEW</option>
                <option value="FULFILLED">FULFILLED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>
            <button type="submit">Update</button>
        </form>
    </td>
</tr>

</table>

</body>
</html>
