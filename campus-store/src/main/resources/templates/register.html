<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h2>Register</h2>

<form th:action="@{/register}" method="post" th:object="${registerRequest}">

    <input type="text" th:field="*{name}" placeholder="Name" required><br><br>

    <input type="email" th:field="*{email}" placeholder="Email" required><br><br>

    <input type="password" th:field="*{password}" placeholder="Password" required><br><br>

    <button type="submit">Register</button>

</form>

<!-- Error display -->
<div th:if="${#fields.hasErrors('*')}">
    <p style="color:red;">Validation error. Check inputs.</p>
</div>

</body>
</html>
