<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Catalog</title>
    <style>
        body { font-family: Arial; margin:0; background:#f5f5f5; }

        .navbar {
            background:#222;
            color:white;
            padding:15px;
        }

        .navbar a {
            color:white;
            margin-right:15px;
            text-decoration:none;
        }

        .container { padding:20px; }

        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
            gap:20px;
        }

        .card {
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        .price { color:green; font-weight:bold; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/catalog">Catalog</a>
    <a href="/orders">Orders</a>
    <a href="/order/create">Create Order</a>
    <a href="/admin">Admin</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">
    <h2>Products</h2>

    <div class="grid">
        <div class="card" th:each="p : ${products}">
            <h3 th:text="${p.name}"></h3>
            <p th:text="${p.description}"></p>
            <p class="price">$<span th:text="${p.price}"></span></p>
            <p>Stock: <span th:text="${p.stockQty}"></span></p>
        </div>
    </div>
</div>

</body>
</html>
