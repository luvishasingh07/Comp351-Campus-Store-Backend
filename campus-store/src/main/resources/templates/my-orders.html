<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Orders</title>
<style>
body {font-family:Arial;background:#f4f4f4;margin:0;}
.container {padding:20px;}
.card {background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;}
</style>
</head>
<body>

<div th:replace="fragments/navbar :: *"></div>

<div class="container">
<h2>My Orders</h2>

<div th:each="o : ${orders}" class="card">
  <p><b>Order ID:</b> <span th:text="${o.id}"></span></p>
  <p><b>Total:</b> $<span th:text="${o.total}"></span></p>
  <p><b>Status:</b> <span th:text="${o.status}"></span></p>
  <a th:href="@{'/orders/' + ${o.id}}">View Details</a>
</div>

</div>

</body>
</html>
