<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Create Order</title>
<style>
body {font-family:Arial;background:#f5f5f5;margin:0;}
.container {padding:20px;}
.card {background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;}
input {width:60px;}
button {background:#007bff;color:#fff;border:none;padding:8px;}
</style>
</head>
<body>

<div th:replace="fragments/navbar :: *"></div>

<div class="container">
<h2>Create Order</h2>

<form method="post" action="/order">

<div th:each="p : ${products}" class="card">
  <p><b th:text="${p.name}"></b></p>
  <p>$<span th:text="${p.price}"></span></p>
  <p>Stock: <span th:text="${p.stockQty}"></span></p>

  Qty:
  <input type="number" name="qty_${p.id}" value="0"/>
</div>

<button type="submit">Place Order</button>

</form>
</div>

</body>
</html>
